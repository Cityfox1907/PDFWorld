<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- maximum-scale + user-scalable=no stop the browser from pinch-zooming its OWN
         chrome and from auto-zooming when a small text field is focused. The document
         itself still zooms — that is handled in JS on the canvas (PageCanvas), so only
         the page magnifies, never the toolbar/tabs. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f5f7" />
    <meta
      name="description"
      content="PDFWorld — PDFs verlustfrei bearbeiten, Seiten verwalten und Formulare ausfüllen. Alles lokal in deinem Browser, nichts wird hochgeladen."
    />
    <!-- PWA: lets phones install PDFWorld to the home screen and launch it full-screen
         like an app. Inert on desktop browsers. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PDFWorld" />
    <title>PDFWorld — PDF Editor</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Für PDFWorld muss JavaScript aktiviert sein.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
